name: Engine Boundary Check

# aetherd-migration ratchet (docs/aetherd-headless-engine-design.md §10):
#   EB1/EB2 — the engine (src/core/ + src/models/) must never depend on the
#             UI: no gui/ header includes, no QtWidgets.
#   EB3     — no file ABOVE the radio seam (src/gui/ + src/core/ + src/models/,
#             excluding the backend tree) may include a VENDOR header; the
#             wire is reached only through IRadioBackend (RFC step 2.4).
# Known legacy offenders are tracked in tools/check_engine_boundary.py and warn
# without blocking; NEW violations fail the job (--strict). The baselines only
# shrink. src/gui/** is in the trigger set because EB3 guards it too.

on:
  pull_request:
    branches: ["**"]
    paths:
      - "src/gui/**"
      - "src/core/**"
      - "src/models/**"
      - "tools/check_engine_boundary.py"
      - ".github/workflows/engine-boundary.yml"

# Auto-cancel superseded runs when a newer commit lands on the same PR, so a
# rapid push stream doesn't stack full runs. PR-only workflow: the run_id suffix
# and the main guard never trigger here (ref is always refs/pull/N/merge), kept
# identical to ci.yml/codeql.yml for uniformity and future-proofing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}${{ github.ref == 'refs/heads/main' && format('-{0}', github.run_id) || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  engine-boundary:
    name: Engine/UI dependency direction
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      # Full-tree scan (fast, stdlib-only): findings annotate inline;
      # only non-legacy violations fail the job.
      - name: Run engine-boundary check
        run: python tools/check_engine_boundary.py --strict
