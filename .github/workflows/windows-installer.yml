name: Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Install Qt6
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          # Qt 6.8 LTS dropped MSVC 2019 builds — arch must be msvc2022.
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtserialport qtwebsockets qtshadertools'

      - name: Install Ninja, Inno Setup, and LLVM
        run: choco install ninja innosetup llvm -y

      # zlib is bundled under third_party/zlib (1.3.1) — no vcpkg install
      # needed; CMake builds zlibstatic from source.  (#2651)

      # Each third-party dep is cached against the hash of its setup
      # script (which pins the version), so cache invalidates the moment
      # we bump a version.  Skips the upstream download + build entirely
      # on cache hit.
      - name: Cache Opus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        id: cache-opus
        with:
          path: third_party/opus
          key: opus-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-opus.ps1') }}

      - name: Setup Opus (SmartLink audio codec)
        if: steps.cache-opus.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-opus.ps1

      - name: Cache FFTW3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        id: cache-fftw
        with:
          path: third_party/fftw3
          key: fftw-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-fftw.ps1') }}

      - name: Setup FFTW3 float (NR4 dependency)
        if: steps.cache-fftw.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-fftw.ps1

      - name: Cache hidapi
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        id: cache-hidapi
        with:
          path: third_party/hidapi
          key: hidapi-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-hidapi.ps1') }}

      - name: Setup hidapi (USB HID device support)
        if: steps.cache-hidapi.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-hidapi.ps1

      - name: Cache DeepFilterNet3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        id: cache-deepfilter
        with:
          path: third_party/deepfilter
          key: deepfilter-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/setup/setup-deepfilter.ps1') }}

      - name: Setup DeepFilterNet3 (DFNR)
        if: steps.cache-deepfilter.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-deepfilter.ps1

      - name: Cache qtkeychain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        id: cache-qtkeychain
        with:
          path: third_party/qtkeychain
          key: qtkeychain-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-qtkeychain.ps1') }}

      - name: Setup qtkeychain (SmartLink credential persistence)
        if: steps.cache-qtkeychain.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-qtkeychain.ps1

      - name: Setup ONNX Runtime (Silero VAD + speaker labeling + signal classifier)
        run: pwsh scripts/setup/setup-onnxruntime.ps1

      - name: Setup sherpa-onnx (non-whisper ASR backend)
        run: pwsh scripts/setup/setup-sherpa-onnx.ps1

      - name: Cache Vulkan SDK
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-vulkan-sdk.ps1') }}

      # Runs unconditionally (not gated on the cache hit): the script skips the
      # heavy install when the SDK is already present but must still export
      # VULKAN_SDK to $GITHUB_ENV for the Configure + Deploy steps below.
      - name: Setup Vulkan SDK (whisper GPU backend)
        run: pwsh scripts/setup/setup-vulkan-sdk.ps1

      - name: Configure
        run: |
          # RelWithDebInfo (not Release): MSVC's Release config omits /Zi and
          # /DEBUG, so build/AetherSDR.pdb never gets produced and the
          # create-msix.ps1 -CreateUpload step silently ships .msixupload
          # packages with no symbols. RelWithDebInfo keeps -O2 optimization
          # (Ob1 vs Release's Ob2 — a negligible inlining difference) while
          # emitting a full PDB, which is what create-msix.ps1 bundles as
          # .appxsym for Partner Center crash symbolication (and what we keep
          # as a standalone artifact for our own WinDbg use).
          # REQUIRE_ASR_ONNX/SHERPA=ON guarantee the Silero VAD + speaker labeling
          # and the sherpa-onnx backend ship (fail the build if their setup scripts
          # didn't stage the runtimes). REQUIRE_ASR_GPU=ON does the same for the
          # whisper Vulkan (ggml-vulkan) GPU backend.
          #
          # ASR_USE_PREBUILT_WHISPER_GPU=ON: consume the pinned whisper/ggml/
          # ggml-vulkan static libs from the whisper-gpu-<ver> release asset
          # instead of compiling from source. MSVC's ~1 h Release compile of the
          # ~1 MB ggml-vulkan.cpp translation unit exceeds windows-latest's step
          # timeout regardless of parallelism; the prebuilt path skips it and
          # the CI-cache producer (scripts/build/build-whisper-vulkan-windows.ps1)
          # cuts a fresh asset whenever whisper.cpp / Vulkan SDK / MSVC bumps.
          #
          # Vulkan is still needed at link time: CMAKE_PREFIX_PATH points
          # find_package(Vulkan) at the SDK's loader import lib (vulkan-1.lib).
          # glslc + SPIRV-Headers are NOT required on the prebuilt path (their
          # only job is compiling ggml-vulkan's own shaders, which are already
          # baked into the shipped .lib). The runtime vulkan-1.dll is bundled
          # in the Deploy step.
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=RelWithDebInfo -DMQTT_TLS=OFF -DREQUIRE_KEYCHAIN=ON -DREQUIRE_SERIALPORT=ON -DREQUIRE_ASR_ONNX=ON -DREQUIRE_ASR_SHERPA=ON -DREQUIRE_ASR_GPU=ON -DASR_USE_PREBUILT_WHISPER_GPU=ON -DCMAKE_PREFIX_PATH="$env:VULKAN_SDK" -DENABLE_NVIDIA_AFX=ON -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET"

      - name: Build Opus (RADE dependency)
        # ExternalProject dependency ordering via BUILD_BYPRODUCTS is correct,
        # but a separate step gives clearer CI failure attribution and avoids
        # any Ninja parallel-build ordering edge cases with IMPORTED targets.
        run: cmake --build build --target build_opus -j $env:NUMBER_OF_PROCESSORS

      # NOTE: the previous "Build ggml-vulkan (isolated, low parallelism)" step
      # was removed. Under ASR_USE_PREBUILT_WHISPER_GPU=ON ggml-vulkan is an
      # IMPORTED target with no build rule, so `--target ggml-vulkan` would
      # fail with "unknown target". If you disable the prebuilt option to
      # bisect, restore that step from git history and expect the historical
      # timeout risk to come back with it.

      - name: Build
        # -j 2 (not full -j): even with ggml-vulkan pre-built, the main build was
        # thrashing 4-wide on the 16 GB runner — the ASR headers (ONNX C++ API /
        # whisper / vulkan-hpp) make many app TUs memory-heavy, so 4 concurrent
        # MSVC processes exceed RAM and swap. Halving parallelism gives each ~8 GB.
        # timeout-minutes fails the STEP (which preserves its log — unlike the
        # job-level 6 h cancel, which discards logs), so a still-slow build is
        # finally diagnosable; NINJA_STATUS stamps elapsed seconds per line to
        # expose the long-pole targets.
        timeout-minutes: 240
        env:
          NINJA_STATUS: "[%f/%t %es] "
        # Only --target AetherSDR (+ its aether-dv-waveform helper dependency)
        # ships; the default `all` also built ~200 unit-test exes the installer
        # never packages or runs — wasted time, and their links contend with the
        # whisper-heavy app link on the 16 GB runner (same starvation we hit in
        # check-windows). Narrowing removes that risk too.
        run: cmake --build build -j 2 --target AetherSDR aether-dv-waveform

      - name: Deploy Qt
        run: |
          mkdir deploy
          copy build\AetherSDR.exe deploy\
          if (-not (Test-Path "build\aether-dv-waveform.exe")) {
            throw "Required ThumbDV helper build\aether-dv-waveform.exe is missing"
          }
          if (-not (Test-Path "build\AetherDV.cfg")) {
            throw "Required digital-voice manifest build\AetherDV.cfg is missing"
          }
          copy build\aether-dv-waveform.exe deploy\
          copy build\AetherDV.cfg deploy\
          # windeployqt treats any Qt6* DLL as an official Qt module and looks for
          # it in the Qt bin directory to scan its transitive dependencies. Copy
          # qt6keychain.dll there before invoking windeployqt so it can resolve it.
          if (Test-Path "third_party\qtkeychain\bin\qt6keychain.dll") {
            copy third_party\qtkeychain\bin\qt6keychain.dll "$env:QT_ROOT_DIR\bin\"
          }
          windeployqt deploy\AetherSDR.exe --release --no-translations --no-system-d3d-compiler
          if (Test-Path "third_party\fftw3\bin\libfftw3-3.dll") {
            copy third_party\fftw3\bin\libfftw3-3.dll deploy\
          }
          if (Test-Path "third_party\fftw3\bin\libfftw3f-3.dll") {
            copy third_party\fftw3\bin\libfftw3f-3.dll deploy\
          }
          if (Test-Path "third_party\hidapi\bin\hidapi.dll") {
            copy third_party\hidapi\bin\hidapi.dll deploy\
          }
          # zlib is statically linked from third_party/zlib (#2651) — no
          # DLL copy needed; zlibstatic is baked into AetherSDR.exe.
          if (Test-Path "third_party\deepfilter\lib\windows-x86_64\deepfilter.dll") {
            copy third_party\deepfilter\lib\windows-x86_64\deepfilter.dll deploy\
          }
          # Windows builds embed the DFNR model in AetherSDR.exe resources, so
          # no loose DeepFilterNet3_onnx.tar.gz payload is deployed.
          # NOTE: MQTT TLS is disabled (-DMQTT_TLS=OFF) so no OpenSSL DLLs
          # are needed. This avoids the "libssl-3-x64.dll not found" crash
          # on systems without OpenSSL installed (#1341, #1362).
          if (Test-Path "third_party\qtkeychain\bin\qt6keychain.dll") {
            copy third_party\qtkeychain\bin\qt6keychain.dll deploy\
          }
          # ASR runtime DLLs. CMake's POST_BUILD stages the ONNX Runtime + sherpa-onnx
          # DLLs next to build\AetherSDR.exe (root of the build dir, non-recursive);
          # windeployqt only handles Qt modules, so copy them into the payload here.
          Get-ChildItem build\*.dll -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Bundling ASR runtime DLL: $($_.Name)"
            Copy-Item $_.FullName deploy\ -Force
          }
          # Vulkan loader for the whisper GPU backend. ggml-vulkan hard-links
          # vulkan-1, so the DLL must ship or the exe fails to start even on
          # CPU-only machines (the loader then enumerates zero devices and ggml
          # falls back to CPU). Ships from the SDK; LunarG permits redistributing
          # the loader.
          # The loader DLL's location varies by SDK layout: newer LunarG SDKs stage
          # it under runtime\x64, older ones under Bin; a driver-installed copy sits
          # in System32. Take the first that exists (Bin alone is NOT reliable).
          $vkCandidates = @(
            (Join-Path $env:VULKAN_SDK "runtime\x64\vulkan-1.dll"),
            (Join-Path $env:VULKAN_SDK "Bin\vulkan-1.dll"),
            "$env:SystemRoot\System32\vulkan-1.dll"
          )
          $vkDll = $vkCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $vkDll) { throw "vulkan-1.dll not found in: $($vkCandidates -join '; ')" }
          Write-Host "Bundling Vulkan loader: $vkDll"
          copy $vkDll deploy\

      - name: Verify DPI awareness manifest
        run: powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\check-dpi-awareness.ps1 -ExePath deploy\AetherSDR.exe

      - name: Stage MSVC runtime for installer
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\stage-msvc-runtime.ps1 -OutputDir installer-runtime

      - name: Create portable ZIP
        run: |
          # Keep portable ZIP app-local runtime behavior aligned with the installer.
          # Sanitize github.ref_name — release-tag pushes give a slash-free
          # "v26.5.3" but workflow_dispatch on a branch ref like
          # "codex/windows-store-msix" injects slashes that break the
          # Compress-Archive destination path.  Strip every filesystem-unsafe
          # character so ad-hoc dispatch runs (e.g. validating new packaging
          # work on a branch) reach the later Inno + MSIX steps instead of
          # exiting 1 at the very first artifact-creation step.
          Copy-Item -Path installer-runtime\*.dll -Destination deploy\ -Force
          $safeRefName = "${{ github.ref_name }}" -replace '[\\/:*?"<>|]', '_'
          Compress-Archive -Path deploy\* -DestinationPath "AetherSDR-$safeRefName-Windows-x64-portable.zip"

      - name: Create installer (Inno Setup)
        run: |
          # Same sanitization as the portable ZIP step — Inno also pukes on
          # filesystem-unsafe characters in /DAPP_VERSION.
          $version = "${{ github.ref_name }}" -replace '^v', '' -replace '[\\/:*?"<>|]', '_'
          $runtimeDir = (Resolve-Path "installer-runtime").Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAPP_VERSION=$version "/DVC_RUNTIME_DIR=$runtimeDir" packaging\windows\installer.iss

      # MSIX runs AFTER the portable ZIP + Inno installer steps and is
      # gated with continue-on-error so a future MSIX hiccup (missing SDK
      # tool on a runner image bump, signtool flake, etc.) can't gate the
      # established portable-zip + Inno installer delivery path that real
      # users depend on.  When MSIX matures we can promote it back into
      # the hard-required artifact set.
      - name: Create MSIX package
        continue-on-error: true
        env:
          AETHERSDR_MSIX_IDENTITY_NAME: ${{ vars.AETHERSDR_MSIX_IDENTITY_NAME }}
          AETHERSDR_MSIX_PUBLISHER: ${{ vars.AETHERSDR_MSIX_PUBLISHER }}
          AETHERSDR_MSIX_DISPLAY_NAME: ${{ vars.AETHERSDR_MSIX_DISPLAY_NAME }}
          AETHERSDR_MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.AETHERSDR_MSIX_PUBLISHER_DISPLAY_NAME }}
          AETHERSDR_MSIX_DESCRIPTION: ${{ vars.AETHERSDR_MSIX_DESCRIPTION }}
          AETHERSDR_MSIX_BACKGROUND_COLOR: ${{ vars.AETHERSDR_MSIX_BACKGROUND_COLOR }}
          AETHERSDR_MSIX_INSTALLER_ACCENT_COLOR: ${{ vars.AETHERSDR_MSIX_INSTALLER_ACCENT_COLOR }}
          AETHERSDR_MSIX_INSTALLER_BACKGROUND_COLOR: ${{ vars.AETHERSDR_MSIX_INSTALLER_BACKGROUND_COLOR }}
        run: |
          . .\packaging\windows\store-identity.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\create-msix.ps1 -DeployDir deploy -OutputDir . -CreateUpload -SkipSign -ExcludeDfnrModel -RequirePdb

      # Hard gate for the PDB-regression class (#3946). The Create MSIX
      # package step above is continue-on-error (to tolerate MSIX SDK/tool
      # flakes), which ALSO swallows create-msix.ps1's -RequirePdb throw — so
      # a missing PDB can't red the build from inside that step. A missing PDB
      # is not an MSIX hiccup though: it's a build regression (e.g.
      # CMAKE_BUILD_TYPE flipped back to Release, which omits /Zi + /DEBUG so
      # no build/AetherSDR.pdb is emitted) that would silently ship
      # symbol-less .msixupload packages and skip the Windows-Symbols upload.
      # Re-check the PDB the RelWithDebInfo Build step must emit in a step that
      # is deliberately NOT continue-on-error, so that regression fails the job
      # loudly instead of landing on a green build. -RequirePdb is kept above
      # for local/dev ergonomics; this step is the CI gate that actually reds.
      - name: Verify debug symbols (PDB) present
        run: |
          if (-not (Test-Path build\AetherSDR.pdb)) {
            throw "build/AetherSDR.pdb is missing. The RelWithDebInfo Windows build must emit a PDB for Partner Center crash symbolication (.appxsym) and the standalone Windows-Symbols artifact. If CMAKE_BUILD_TYPE was changed to Release, restore RelWithDebInfo. See #3946 / #3934."
          }
          Write-Host "PDB present: build\AetherSDR.pdb"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Windows-Installer
          path: |
            AetherSDR-*.zip
            AetherSDR-*-setup.exe
            AetherSDR-*.msix
            AetherSDR-*.msixupload
            AetherSDR-*.appxsym

      # Standalone PDB, kept separately from the .msixupload bundle above so
      # maintainers can pull matching debug symbols for WinDbg/Visual Studio
      # without unzipping a Store submission package — same PDB that's zipped
      # into the .appxsym for Partner Center's crash symbolication.
      - name: Upload debug symbols
        if: hashFiles('build/AetherSDR.pdb') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Windows-Symbols
          path: build/AetherSDR.pdb
          retention-days: 90

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          # .msixupload is the Partner Center upload artifact (manual Store
          # submission for now — see docs/WINDOWS-STORE-MSIX.md). It's a
          # maintainer-only package; the raw .msix is intentionally left off
          # the public release because CI builds it unsigned (-SkipSign) and
          # an unsigned .msix can't be sideloaded by end users. The .msix is
          # still kept in the upload-artifact step for maintainer inspection.
          # The MSIX step is continue-on-error, so this glob may match nothing
          # on a failed build; softprops skips unmatched globs rather than
          # failing the release.
          files: |
            AetherSDR-*.zip
            AetherSDR-*-setup.exe
            AetherSDR-*.msixupload

      # ----------------------------------------------------------------------
      # Automated Microsoft Store submission (weekly release cycle).
      #
      # Runs ONLY on a v* tag push, and ONLY when the AETHERSDR_STORE_PRODUCT_ID
      # repository VARIABLE is set. PRs, branch workflow_dispatch runs, and forks
      # never touch Partner Center because (a) the tag-ref guard, (b) the
      # product-Id guard, and (c) forks have no access to the repo secrets.
      #
      # The submission is staged as a DRAFT (publish-store.ps1 passes
      # --noCommit): the package uploads to Partner Center but certification is
      # NOT started. A maintainer reviews the pending submission and clicks
      # "Submit to Store". CI never publishes to the live channel on its own.
      #
      # Free-product only (AetherSDR qualifies). The app must already be live in
      # the Store. One-time Entra/Partner Center setup is in
      # docs/WINDOWS-STORE-MSIX.md.
      # ----------------------------------------------------------------------
      - name: Setup Microsoft Store Developer CLI
        if: startsWith(github.ref, 'refs/tags/') && vars.AETHERSDR_STORE_PRODUCT_ID != ''
        uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4

      - name: Stage Microsoft Store submission (draft)
        if: startsWith(github.ref, 'refs/tags/') && vars.AETHERSDR_STORE_PRODUCT_ID != ''
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          AETHERSDR_STORE_PRODUCT_ID: ${{ vars.AETHERSDR_STORE_PRODUCT_ID }}
        run: |
          msstore reconfigure `
            --tenantId $env:AZURE_AD_TENANT_ID `
            --sellerId $env:SELLER_ID `
            --clientId $env:AZURE_AD_APPLICATION_CLIENT_ID `
            --clientSecret $env:AZURE_AD_APPLICATION_SECRET
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\publish-store.ps1 -ProductId $env:AETHERSDR_STORE_PRODUCT_ID
